services:
  postgres:
    image: postgres:17-alpine
    container_name: polka-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-polka}
      POSTGRES_USER: ${POSTGRES_USER:-polka}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-polka}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-polka} -d ${POSTGRES_DB:-polka}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: polka-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY_ID:-polka}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_ACCESS_KEY:-polka-polkas3-secret}
    command: server /data --console-address ":9001"
    ports:
      - "${STORAGE_PORT:-9000}:9000"
      - "${STORAGE_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: polka-backend
    restart: unless-stopped
    environment:
      APP_ENV: development
      PORT: 8080
      DATABASE_URL: postgres://${POSTGRES_USER:-polka}:${POSTGRES_PASSWORD:-polka}@postgres:5432/${POSTGRES_DB:-polka}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-polka-dev-secret}
      AUTO_MIGRATE: "true"
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:4200,http://127.0.0.1:4200,https://polka.keykomi.com}
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_REGION: ${STORAGE_REGION:-us-east-1}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-polka-covers}
      STORAGE_ACCESS_KEY_ID: ${STORAGE_ACCESS_KEY_ID:-polka}
      STORAGE_SECRET_ACCESS_KEY: ${STORAGE_SECRET_ACCESS_KEY:-polka-polkas3-secret}
      STORAGE_USE_PATH_STYLE: "true"
      STORAGE_AUTO_CREATE_BUCKET: "true"
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: polka-frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres-data:
  minio-data:
