<tui-root>
  <div class="app-shell">
    <div class="app-shell__content">
      <router-outlet />
    </div>

    @if (showFooter()) {
      <footer class="site-footer">
        <div class="site-footer__meta">
          <p class="site-footer__label">Polka</p>
          <p>Личная библиотека, заметки и публичные книжные подборки.</p>
        </div>

        <div class="site-footer__actions">
          @if (showGuestFooterLinks()) {
            <nav class="site-footer__auth" aria-label="Авторизация">
              <a class="site-footer__auth-link" routerLink="/login">Вход</a>
              <span class="site-footer__auth-divider" aria-hidden="true">/</span>
              <a
                class="site-footer__auth-link site-footer__auth-link--accent"
                routerLink="/register"
              >
                Создать свою полку
              </a>
            </nav>
          }

          <div class="site-footer__links">
            <p>Создатель: MattoYuzuru</p>
            <a href="https://github.com/MattoYuzuru/Polka" rel="noreferrer" target="_blank">
              GitHub repository
            </a>
          </div>
        </div>
      </footer>
    }
  </div>
</tui-root>
