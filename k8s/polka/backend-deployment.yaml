apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: polka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: polka-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: polka-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/mattoyuzuru/polka/backend:main
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: APP_ENV
              value: production
            - name: PORT
              value: "8080"
            - name: AUTO_MIGRATE
              value: "true"
            - name: ALLOWED_ORIGINS
              value: https://polka.keykomi.com
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: polka-secrets
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: polka-secrets
                  key: postgres-password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: polka-secrets
                  key: postgres-database
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: polka-secrets
                  key: jwt-secret
            - name: STORAGE_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: polka-secrets
                  key: storage-access-key-id
            - name: STORAGE_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: polka-secrets
                  key: storage-secret-access-key
            - name: STORAGE_BUCKET
              valueFrom:
                secretKeyRef:
                  name: polka-secrets
                  key: storage-bucket
            - name: STORAGE_REGION
              valueFrom:
                secretKeyRef:
                  name: polka-secrets
                  key: storage-region
            - name: DATABASE_URL
              value: postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)?sslmode=disable
            - name: STORAGE_ENDPOINT
              value: http://minio:9000
            - name: STORAGE_USE_PATH_STYLE
              value: "true"
            - name: STORAGE_AUTO_CREATE_BUCKET
              value: "true"
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: http
            failureThreshold: 24
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
